<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — GAStos</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f9fafb;
        color: #111827;
        text-align: center;
        padding: 1.5rem;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6b7280;
        margin: 0 0 1.5rem;
        max-width: 320px;
      }
      button {
        background: #16a34a;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #15803d;
      }
    </style>
  </head>
  <body>
    <div class="icon">⛽</div>
    <h1>You're offline</h1>
    <p>
      GAStos needs an internet connection. Please check your connection and try
      again.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </body>
</html>
